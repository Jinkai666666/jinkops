spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://43.139.59.233:3306/jinkops?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: "030412"

  main:
    lazy-initialization: true
    banner-mode: "off"

  devtools:
    restart:
      enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
      show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.web.servlet.MultipartAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
      - org.springframework.boot.autoconfigure.validation.ValidationAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  data:
    redis:
      host: 43.139.59.233
      port: 6379
      password:
      database: 0

server:
  port: 8080


logging:
  level:
    root: OFF                        # Spring 全关闭
    com.jinkops: INFO                # 仅项目日志输出
    org.springframework.boot.StartupInfoLogger: INFO  # 启动时间显示

  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} [traceId=%X{traceId}] %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: "JinkOps API"
      packages-to-scan: com.jinkops.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
